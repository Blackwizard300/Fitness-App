<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardio Friday - VASK FITNESS</title>
  <link rel="stylesheet" href="cardio_friday.css" />
</head>
<body>
<header class="site-header" id="site-header">
    </header> 

<main class="main-content">
  <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/b50ed5bb08978932cf0735b39555d1c083667800" alt="Background" class="background-image" />
  <section class="workout-section">
    <h2 class="workout-section__title">Mixed Cardio + Recovery</h2>
    <ul class="workout-steps">
      <li class="workout-step">
        <h3 class="workout-step__title">1. Dance Cardio / Zumba (45 min)</h3>
        <p class="workout-step__description">Choose a fun and fast-paced routine</p>
      </li>
      <li class="workout-step">
        <h3 class="workout-step__title">2. Stair Climbing / Hill Sprints (30 min)</h3>
        <p class="workout-step__description">Sprint 30 sec → Walk down → Repeat 8–10x</p>
      </li>
      <li class="workout-step">
        <h3 class="workout-step__title">3. Light Jog + Walk (30 min)</h3>
        <p class="workout-step__description">Use as active recovery</p>
      </li>
      <li class="workout-step">
        <h3 class="workout-step__title">4. Deep Stretch + Foam Roll (15 min)</h3>
      </li>
    </ul>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
