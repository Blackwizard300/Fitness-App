<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VASK FITNESS - Workout Week Selection</title>
  <link rel="stylesheet" href="workout.css">
  <link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="weekchoose">
    <header class="navigation-header">
      <div class="logo-container">
        <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/1a2b279d63205da0f1533bc9da9c25df9ebca245?placeholderIfAbsent=true&apiKey=d00569c252494ad98a606b889114629f" class="logo-image" alt="VASK FITNESS Logo" />
        <h1 class="brand-name">VASK FITNESS</h1>
      </div>
      <nav class="main-navigation">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">About us</a>
        <a href="#" class="nav-link">Meal</a>
        <a href="#" class="nav-link active">Workout</a>
        <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/70dabb4641fdacdc5e401a2306246c2dd71813c0?placeholderIfAbsent=true&apiKey=d00569c252494ad98a606b889114629f" class="profile-icon" alt="Profile" />
      </nav>
    </header>

    <main class="workout-content" space="0">
      <div class="content-container">
        <section class="days-left-column">
          <div class="days-content">
            <h2 class="challenge-title">7 Days workout challenge</h2>
            <article class="day-card sunday-card">
              <span class="special-font">Sunday</span>
            </article>
            <div class="additional-days">
              <article class="day-card tuesday-card">
                <span class="special-font">Tuesday</span>
              </article>
              <article class="day-card thursday-card">
                <span class="special-font">Thursday</span>
              </article>
            </div>
          </div>
        </section>

        <section class="days-right-column">
          <div class="image-container">
            <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/3af977cbe7aca33e46e67bb84f0f8a5ce5905415?placeholderIfAbsent=true&apiKey=d00569c252494ad98a606b889114629f" class="background-image" alt="Workout background" />
            <article class="day-card monday-card">
              <span class="special-font">Monday</span>
            </article>
            <article class="day-card wednesday-card">
              <span class="special-font">Wednesday</span>
            </article>
            <article class="day-card friday-card">
              <span class="special-font">Friday</span>
            </article>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
