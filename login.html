<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VASK FITNESS - Login</title>
  <link rel="stylesheet" href="login.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@700&family=Crimson+Text&family=Inter&family=Inconsolata:wght@800&display=swap" rel="stylesheet"/>
</head>
<body>
  <main class="login-container">

    <!-- Header -->
    <header class="site-header">
      <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/7b6541ede10c1638f975eb8462cc5781a46fc7e2?placeholderIfAbsent=true" alt="Logo" class="logo"/>
      <h1 class="brand-name">VASK FITNESS</h1>
    </header>

    <!-- Login Form -->
    <section class="login-form-container">
      <h2 class="login-title">Login</h2>

      <form class="login-form">

        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-input" required />
        </div>

        <!-- Password -->
        <div class="form-group password-group">
          <div class="label-row">
            <label for="password" class="form-label">Password</label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>
          <input type="password" id="password" class="form-input" required />
        </div>

        <!-- Login button -->
        <button type="submit" class="login-button">Login</button>

      </form>
    </section>

    <!-- Background Image -->
    <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/37b44e685a8b9821adbc5f5629db1e334bed0493?placeholderIfAbsent=true" 
         alt="Bodybuilder Background" 
         class="background-image"/>

  </main>
</body>
</html>
