<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VASK Fitness</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="homepage1.css" />
    <link rel="stylesheet" href="main.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div class="page-container">
      <!-- HEADER -->
      <header class="site-header" id="site-header">
  
      </header>

      <!-- HERO SECTION -->
      <main class="hero-section">
        <section class="hero-content">
          <h2 class="hero-tagline">Keep your</h2>
          <h1 class="hero-title">Body Fit &amp; Strong</h1>
          <p class="hero-description">
            In here we will help you to shape and build your ideal body and live
            your life to the fullest.
          </p>
        </section>
        <img
          class="hero-image"
          src="https://cdn.builder.io/api/v1/image/assets/TEMP/56b702e21b6d2dae7b20e243b8fd87951a49e41d?placeholderIfAbsent=true"
          alt="Fitness Hero Image"
        />
      </main>

      <!-- Chat Widget -->
      <div class="chat-widget-button" id="chat-widget-button">
        <i class="fas fa-comments"></i>
      </div>
      
      <div class="chat-container" id="chat-container">
        <div class="chat-header">
          <h1>Fitness Assistant</h1>
          <p>Ask me about workouts, nutrition, and fitness!</p>
          <button class="close-button" id="close-chat">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-container">
          <textarea 
            id="user-input" 
            placeholder="Type your fitness question here..." 
            rows="1"
            maxlength="500"
          ></textarea>
          <button id="send-button" type="button">Send</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <script src="main.js"></script>
  </body>
</html>
