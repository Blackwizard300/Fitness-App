<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VASK Fitness</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&family=Inter:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="homepage1.css" />
  </head>
  <body>
    <div class="page-container">
      <!-- HEADER -->
      <header class="site-header">
        <div class="brand">
          <img
            src="https://cdn.builder.io/api/v1/image/assets/TEMP/7b6541ede10c1638f975eb8462cc5781a46fc7e2?placeholderIfAbsent=true"
            alt="Logo"
            class="logo"
          />
          <h1 class="brand-name">VASK FITNESS</h1>
        </div>

        <div class="nav-profile-wrapper">
          <nav class="main-nav">
            <!-- Add the search bar between VASK FITNESS and Home -->
            <div class="search-bar">
              <input type="text" placeholder="Search..." class="search-input" />
            </div>
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">About Us</a>

            <!-- Meal Dropdown -->
            <div class="nav-link dropdown">
              <a href="#" class="dropdown-toggle">Meal</a>
              <div class="dropdown-menu">
                <a href="#" class="dropdown-item">Weight Gain</a>
                <a href="#" class="dropdown-item">Weight Loss</a>
              </div>
            </div>

            <a href="#" class="nav-link">Workout</a>
          </nav>
          <div class="profile-icon">
            <img
              src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png"
              alt="Profile"
            />
          </div>
        </div>
      </header>

      <!-- HERO SECTION -->
      <main class="hero-section">
        <section class="hero-content">
          <h2 class="hero-tagline">Keep your</h2>
          <h1 class="hero-title">Body Fit &amp; Strong</h1>
          <p class="hero-description">
            In here we will help you to shape and build your ideal body and live
            your life to the fullest.
          </p>
          <button class="cta-button">
            Get Started
            <svg
              class="arrow-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                fill="#111517"
                d="M13.172 12l-4.95-4.95 1.414-1.414L16 12l-6.364 6.364-1.414-1.414z"
              />
            </svg>
          </button>
        </section>
        <img
          class="hero-image"
          src="https://cdn.builder.io/api/v1/image/assets/TEMP/56b702e21b6d2dae7b20e243b8fd87951a49e41d?placeholderIfAbsent=true"
          alt="Fitness Hero Image"
        />
      </main>
    </div>
  </body>
</html>
