<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardio Tuesday - VASK FITNESS</title>
  <link rel="stylesheet" href="cardio_tuesday.css" />
</head>
<body>
<main class="workout-page">
  <div class="page-container">
    <img src="https://cdn.builder.io/api/v1/image/assets/beadebc2327f4b1080f7e8c568788d2b/6fd1825f6b93a65fe1fd2b5802a8e0f1b23cda7b?placeholderIfAbsent=true" class="background-image" alt="Workout background image"/>

    <header class="site-header" id="site-header">
    </header> 

    <section class="workout-content">
      <h2 class="workout-title">Zumba + Light Jog</h2>

      <article class="workout-details">
        <h3 class="workout-section-title">1. Zumba Session (1 hour)</h3>
        <ul>
          <li>Follow a guided class or playlist with upbeat music</li>
        </ul>

        <h3 class="workout-section-title">2. Light Jog / Fast Walk (45 min)</h3>
        <ul>
          <li>Keep heart rate moderate, enjoy the pace</li>
        </ul>

        <h3 class="workout-section-title">3. Full Body Stretch (15 min)</h3>
        <ul>
          <li>Focus on hips, shoulders, lower back</li>
        </ul>
      </article>
    </section>
  </div>
</main>
  <script src="script.js"></script>
</body>
</html>
