<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - VASK FITNESS</title>
    <link rel="stylesheet" href="adminpanel.css">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@700&family=Crimson+Text&family=Inter&family=Inconsolata:wght@800&display=swap" rel="stylesheet"/>
    <style>
        .error-message {
            background-color: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="brand-section">
            <img src="https://cdn.builder.io/api/v1/image/assets/TEMP/7b6541ede10c1638f975eb8462cc5781a46fc7e2?placeholderIfAbsent=true" alt="Logo" class="logo"/>
            <h1 class="brand-name">VASK FITNESS</h1>
        </div>
        <nav class="admin-nav">
            <a href="homepage1.html" class="nav-link">Home</a>
            <a href="#" class="nav-link active">Admin Panel</a>
            <a href="logout.php" class="nav-link">Logout</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="admin-container">
        <h2 class="panel-title">Admin Panel</h2>
        
        <div class="admin-controls">
            <button id="viewUsersBtn" class="admin-button">View All Users</button>
            <input type="text" id="searchInput" class="search-input" placeholder="Search users...">
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="table">
            <table id="usersTable" class="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Weight (kg)</th>
                        <th>Height (cm)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- User data will be populated here -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.getElementById('viewUsersBtn').addEventListener('click', fetchUsers);
        document.getElementById('searchInput').addEventListener('input', filterUsers);

        let allUsers = []; // Store all users for filtering

        async function fetchUsers() {
            try {
                const response = await fetch('get_users.php');
                const data = await response.json();
                
                if (data.success) {
                    allUsers = data.users;
                    displayUsers(allUsers);
                } else {
                    showError(data.message || 'Failed to fetch users');
                }
            } catch (error) {
                showError('An error occurred while fetching users');
            }
        }

        function displayUsers(users) {
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';

            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.firstname}</td>
                    <td>${user.lastname}</td>
                    <td>${user.email}</td>
                    <td>${user.phone}</td>
                    <td>${user.age || '-'}</td>
                    <td>${user.gender || '-'}</td>
                    <td>${user.weight || '-'}</td>
                    <td>${user.height || '-'}</td>
                    <td>
                        <button onclick="deleteUser(${user.id})" class="action-btn delete">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterUsers(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredUsers = allUsers.filter(user => 
                user.firstname.toLowerCase().includes(searchTerm) ||
                user.lastname.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );
            displayUsers(filteredUsers);
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) return;

            try {
                const response = await fetch('delete_user.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userId })
                });
                const data = await response.json();

                if (data.success) {
                    fetchUsers(); // Refresh the table
                } else {
                    showError(data.message || 'Failed to delete user');
                }
            } catch (error) {
                showError('An error occurred while deleting user');
            }
        }

        function editUser(userId) {
            // Redirect to edit page or show edit modal
            window.location.href = `edit_user.php?id=${userId}`;
        }

        // Fetch users when page loads
        fetchUsers();
    </script>
</body>
</html>
